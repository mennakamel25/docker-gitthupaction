name: Deployment
on:
  push:
    branches:
      - main
jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: npm install

      - name: Run tests only on main
        if: github.ref == 'refs/heads/main'
        run: npm test

      - name: Build app
        run: npm run build