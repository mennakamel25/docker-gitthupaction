name: "my first github action by js"
description: "This is my first github action by js"
inputs:
  bucket-name:
    description: "The name of the S3 bucket to deploy to"
    required: true
  region:
    description: "The AWS region where the S3 bucket is located"
    required: true
    default: "us-east-1"
  directory:
    description: "The local directory to deploy to S3"
    required: true

runs:
  using: "node20"
  main: "index.js"
